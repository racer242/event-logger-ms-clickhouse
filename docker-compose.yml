version: '3.8'

services:
  # Event Logger API
  event-logger:
    build:
      context: .
      dockerfile: Dockerfile
    image: event-logger-ms-clickhouse-event-logger:latest
    container_name: event-logger-api
    ports:
      - '3242:3242'
    volumes:
      - ./data:/app/data # SQLite database file
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3242
      - HOST=0.0.0.0
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE}
      - CLICKHOUSE_ASYNC_INSERT=${CLICKHOUSE_ASYNC_INSERT:-0}
      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-0}
      - CLICKHOUSE_SKIP_HEALTH_CHECK=${CLICKHOUSE_SKIP_HEALTH_CHECK:-false}
      - CLICKHOUSE_MAX_CONNECTIONS=${CLICKHOUSE_MAX_CONNECTIONS:-10}
      - QUEUE_TYPE=${QUEUE_TYPE:-sqlite}
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - QUEUE_PREFIX=${QUEUE_PREFIX:-event_logger}
      - REDIS_SKIP_HEALTH_CHECK=${REDIS_SKIP_HEALTH_CHECK:-false}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-data/events.db}
      - QUEUE_FLUSH_INTERVAL_MS=${QUEUE_FLUSH_INTERVAL_MS:-5000}
      - QUEUE_BATCH_SIZE=${QUEUE_BATCH_SIZE:-100}
      - API_KEY_HEADER=${API_KEY_HEADER:-X-API-Key}
      - API_KEYS=${API_KEYS}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-true}
      - SWAGGER_PATH=${SWAGGER_PATH:-/api/docs}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3242/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - event-logger-network

networks:
  event-logger-network:
    driver: bridge
