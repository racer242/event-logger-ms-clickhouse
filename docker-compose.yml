version: '3.8'

services:
  # ClickHouse Database
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: event-logger-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native client interface
    environment:
      - CLICKHOUSE_DB=event_logger
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-logger-network

  # Redis (for future queue implementation)
  redis:
    image: redis:7-alpine
    container_name: event-logger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-logger-network

  # Event Logger API
  event-logger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-logger-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DATABASE=event_logger
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BUFFER_MAX_SIZE=1000
      - BUFFER_FLUSH_INTERVAL_MS=5000
      - API_KEYS=dev-api-key-12345,prod-api-key-67890
      - SWAGGER_ENABLED=true
      - SWAGGER_PATH=/api/docs
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - event-logger-network
    restart: unless-stopped

networks:
  event-logger-network:
    driver: bridge

volumes:
  clickhouse_data:
  redis_data:
